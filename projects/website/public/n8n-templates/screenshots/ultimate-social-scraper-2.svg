    <text x="286" y="153" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">47.2K</text>
    <text x="386" y="153" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">342</text>
    <rect x="466" y="142" width="70" height="20" rx="4" fill="#4ade80" opacity="0.2"/>
    <text x="476" y="156" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#4ade80">8.2%</text>


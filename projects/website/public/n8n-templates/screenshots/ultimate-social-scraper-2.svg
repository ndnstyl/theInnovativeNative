    <text x="313" y="405" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">09:00 AM UTC</text>
    <polygon points="542,400 547,405 542,410" fill="#666"/>

    <!-- Form section 3: Output Format -->
    <text x="24" y="455" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#aaa">OUTPUT FORMAT</text>

    <text x="24" y="485" font-family="Inter, sans-serif" font-size="11" fill="#999">Export to</text>
    <rect x="24" y="495" width="255" height="40" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
    <text x="36" y="520" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">Google Sheets + Airtable</text>

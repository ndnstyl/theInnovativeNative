<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Panel shadow -->
    <filter id="panelShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#0a0a0a"/>

  <!-- Main title -->
  <text x="40" y="50" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#e5e5e5">Scraper Configuration & Output Preview</text>
  <text x="40" y="75" font-family="Inter, sans-serif" font-size="13" fill="#888">Configure your scraping targets and preview collected data</text>

  <!-- Left panel: Settings -->
  <g transform="translate(40, 110)">
    <rect x="0" y="0" width="580" height="570" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2" filter="url(#panelShadow)"/>

    <!-- Panel header -->
    <text x="24" y="35" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#e5e5e5">Configuration</text>
    <line x1="24" y1="50" x2="556" y2="50" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Form section 1: Target Profiles -->
    <text x="24" y="85" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#aaa">TARGET PROFILES</text>

    <!-- Platform selector -->
    <text x="24" y="115" font-family="Inter, sans-serif" font-size="11" fill="#999">Platforms</text>
    <rect x="24" y="125" width="532" height="40" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1"/>

    <!-- Platform checkboxes -->
    <g transform="translate(40, 138)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#00FFFF" stroke="#00FFFF" stroke-width="2"/>
      <path d="M 3,7 L 6,10 L 11,3" stroke="#0a0a0a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="20" y="11" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">LinkedIn</text>
    </g>
    <g transform="translate(140, 138)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#00FFFF" stroke="#00FFFF" stroke-width="2"/>
      <path d="M 3,7 L 6,10 L 11,3" stroke="#0a0a0a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="20" y="11" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">Twitter</text>
    </g>
    <g transform="translate(235, 138)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#00FFFF" stroke="#00FFFF" stroke-width="2"/>
      <path d="M 3,7 L 6,10 L 11,3" stroke="#0a0a0a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="20" y="11" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">Instagram</text>
    </g>
    <g transform="translate(345, 138)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#222" stroke="#444" stroke-width="1"/>
      <text x="20" y="11" font-family="Inter, sans-serif" font-size="11" fill="#666">Facebook</text>
    </g>
    <g transform="translate(445, 138)">

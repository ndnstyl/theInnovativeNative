    <circle cx="46" cy="360" r="6" fill="#00f2ea"/>
    <text x="60" y="355" font-family="Inter, sans-serif" font-size="10" fill="#999">TikTok</text>
    <text x="60" y="370" font-family="Inter, sans-serif" font-size="9" fill="#666">Creator</text>
    <text x="136" y="363" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">@content_creator</text>
    <text x="286" y="363" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">312K</text>
    <text x="386" y="363" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">2,891</text>
    <rect x="466" y="352" width="70" height="20" rx="4" fill="#4ade80" opacity="0.2"/>
    <text x="476" y="366" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#4ade80">15.8%</text>

    <!-- Row 5 -->
    <rect x="24" y="400" width="532" height="60" rx="6" fill="#111"/>
    <circle cx="46" cy="430" r="6" fill="#0077b5"/>
    <text x="60" y="425" font-family="Inter, sans-serif" font-size="10" fill="#999">LinkedIn</text>
    <text x="136" y="433" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">@b2b_specialist</text>
    <text x="286" y="433" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">23.1K</text>
    <text x="386" y="433" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">187</text>
    <rect x="466" y="422" width="70" height="20" rx="4" fill="#fbbf24" opacity="0.2"/>
    <text x="476" y="436" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#fbbf24">6.3%</text>


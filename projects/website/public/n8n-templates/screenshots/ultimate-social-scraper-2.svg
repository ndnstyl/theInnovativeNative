    <text x="36" y="505" font-family="Inter, sans-serif" font-size="10" fill="#666">Total Profiles:</text>
    <text x="36" y="522" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#00FFFF">147</text>

    <text x="186" y="505" font-family="Inter, sans-serif" font-size="10" fill="#666">Total Followers:</text>
    <text x="186" y="522" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#00FFFF">8.2M</text>

    <text x="356" y="505" font-family="Inter, sans-serif" font-size="10" fill="#666">Avg. Engagement:</text>

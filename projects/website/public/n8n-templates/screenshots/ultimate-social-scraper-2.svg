    <circle cx="46" cy="290" r="6" fill="#E4405F"/>
    <text x="60" y="285" font-family="Inter, sans-serif" font-size="10" fill="#999">Instagram</text>
    <text x="136" y="293" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">@digital_marketer</text>
    <text x="286" y="293" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">89.5K</text>
    <text x="386" y="293" font-family="Inter, sans-serif" font-size="11" fill="#e5e5e5">523</text>
    <rect x="466" y="282" width="70" height="20" rx="4" fill="#fbbf24" opacity="0.2"/>
    <text x="476" y="296" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#fbbf24">5.7%</text>

    <!-- Row 4 -->

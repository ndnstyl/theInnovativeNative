    <rect x="24" y="205" width="532" height="100" rx="6" fill="#0a0a0a" stroke="#00FFFF" stroke-width="2"/>
    <text x="36" y="225" font-family="Inter, sans-serif" font-size="10" fill="#00FFFF" font-family="monospace">linkedin.com/in/tech-influencer</text>
    <text x="36" y="245" font-family="Inter, sans-serif" font-size="10" fill="#00FFFF" font-family="monospace">twitter.com/saas_founder</text>
    <text x="36" y="265" font-family="Inter, sans-serif" font-size="10" fill="#00FFFF" font-family="monospace">instagram.com/digital_marketer</text>
    <text x="36" y="285" font-family="Inter, sans-serif" font-size="10" fill="#666" font-family="monospace">tiktok.com/@content_creator</text>

    <!-- Form section 2: Schedule -->

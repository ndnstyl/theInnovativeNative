<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Canvas background -->
    <pattern id="canvasGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#252525" stroke-width="1" opacity="0.2"/>
    </pattern>

    <!-- Node shadow -->
    <filter id="nodeShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Canvas background -->
  <rect width="1280" height="720" fill="#1a1a1a"/>
  <rect width="1280" height="720" fill="url(#canvasGrid)"/>

  <!-- Connection lines between nodes -->
  <g stroke="#444" stroke-width="3" fill="none" opacity="0.6">
    <path d="M 230 360 L 350 360"/>
    <path d="M 470 360 L 590 360"/>
    <path d="M 710 360 L 830 360"/>
    <path d="M 950 360 L 1030 310"/>
    <path d="M 950 360 L 1030 410"/>

    <!-- Connection arrows -->
    <polygon points="348,357 355,360 348,363" fill="#444"/>
    <polygon points="588,357 595,360 588,363" fill="#444"/>
    <polygon points="828,357 835,360 828,363" fill="#444"/>
    <polygon points="1025,308 1032,307 1028,313" fill="#444"/>
    <polygon points="1025,412 1032,413 1028,407" fill="#444"/>
  </g>

  <!-- Node 1: Schedule Trigger (green) -->
  <g transform="translate(110, 360)" filter="url(#nodeShadow)">
    <rect x="0" y="-40" width="120" height="80" rx="8" fill="#2a2a2a" stroke="#4ade80" stroke-width="2"/>
    <rect x="8" y="-32" width="24" height="24" rx="4" fill="#4ade80" opacity="0.2"/>
    <!-- Clock icon -->
    <circle cx="20" cy="-20" r="6" fill="none" stroke="#4ade80" stroke-width="1.5"/>
    <line x1="20" y1="-20" x2="20" y2="-24" stroke="#4ade80" stroke-width="1.5"/>
    <line x1="20" y1="-20" x2="23" y2="-17" stroke="#4ade80" stroke-width="1.5"/>
    <!-- Text -->
    <text x="38" y="-26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#e5e5e5">Schedule</text>
    <text x="38" y="-12" font-family="Inter, sans-serif" font-size="10" fill="#888">Trigger</text>
    <text x="10" y="20" font-family="Inter, sans-serif" font-size="9" fill="#666">Daily at 9 AM</text>
  </g>

  <!-- Node 2: Apify Scraper (cyan) -->
  <g transform="translate(350, 360)" filter="url(#nodeShadow)">
    <rect x="0" y="-40" width="120" height="80" rx="8" fill="#2a2a2a" stroke="#00FFFF" stroke-width="2"/>
    <rect x="8" y="-32" width="24" height="24" rx="4" fill="#00FFFF" opacity="0.2"/>
    <!-- Cloud/scraper icon -->
    <path d="M 14,-22 Q 14,-26 18,-26 Q 20,-28 22,-26 Q 26,-26 26,-22 Q 26,-18 22,-18 L 18,-18 Q 14,-18 14,-22 Z" fill="none" stroke="#00FFFF" stroke-width="1.5"/>
    <line x1="17" y1="-15" x2="17" y2="-12" stroke="#00FFFF" stroke-width="1"/>
    <line x1="20" y1="-15" x2="20" y2="-12" stroke="#00FFFF" stroke-width="1"/>
    <line x1="23" y1="-15" x2="23" y2="-12" stroke="#00FFFF" stroke-width="1"/>
    <!-- Text -->
    <text x="38" y="-26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#e5e5e5">Apify</text>
    <text x="38" y="-12" font-family="Inter, sans-serif" font-size="10" fill="#888">Social Scraper</text>
    <text x="10" y="20" font-family="Inter, sans-serif" font-size="9" fill="#666">Multi-platform</text>
  </g>

  <!-- Node 3: Data Transform (cyan) -->
  <g transform="translate(590, 360)" filter="url(#nodeShadow)">
    <rect x="0" y="-40" width="120" height="80" rx="8" fill="#2a2a2a" stroke="#00FFFF" stroke-width="2"/>
    <rect x="8" y="-32" width="24" height="24" rx="4" fill="#00FFFF" opacity="0.2"/>
    <!-- Transform icon -->
    <circle cx="16" cy="-24" r="2" fill="#00FFFF"/>
    <circle cx="24" cy="-24" r="2" fill="#00FFFF"/>
    <circle cx="16" cy="-16" r="2" fill="#00FFFF"/>
    <circle cx="24" cy="-16" r="2" fill="#00FFFF"/>
    <line x1="18" y1="-24" x2="22" y2="-16" stroke="#00FFFF" stroke-width="1"/>
    <line x1="18" y1="-16" x2="22" y2="-24" stroke="#00FFFF" stroke-width="1"/>
    <!-- Text -->
    <text x="38" y="-26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#e5e5e5">Transform</text>
    <text x="38" y="-12" font-family="Inter, sans-serif" font-size="10" fill="#888">Data</text>
    <text x="10" y="20" font-family="Inter, sans-serif" font-size="9" fill="#666">Normalize fields</text>
  </g>

  <!-- Node 4: Filter (cyan) -->
  <g transform="translate(830, 360)" filter="url(#nodeShadow)">
    <rect x="0" y="-40" width="120" height="80" rx="8" fill="#2a2a2a" stroke="#00FFFF" stroke-width="2"/>
    <rect x="8" y="-32" width="24" height="24" rx="4" fill="#00FFFF" opacity="0.2"/>
    <!-- Filter funnel icon -->
    <path d="M 14,-26 L 26,-26 L 22,-18 L 18,-18 Z" fill="none" stroke="#00FFFF" stroke-width="1.5"/>
    <line x1="20" y1="-18" x2="20" y2="-12" stroke="#00FFFF" stroke-width="1.5"/>
    <!-- Text -->
    <text x="38" y="-26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#e5e5e5">Filter</text>
    <text x="38" y="-12" font-family="Inter, sans-serif" font-size="10" fill="#888">Quality Check</text>
    <text x="10" y="20" font-family="Inter, sans-serif" font-size="9" fill="#666">Min 1k followers</text>
  </g>

  <!-- Node 5: Google Sheets (purple) -->
  <g transform="translate(1030, 310)" filter="url(#nodeShadow)">
    <rect x="0" y="-40" width="140" height="80" rx="8" fill="#2a2a2a" stroke="#a78bfa" stroke-width="2"/>
    <rect x="8" y="-32" width="24" height="24" rx="4" fill="#a78bfa" opacity="0.2"/>
    <!-- Sheets icon -->
    <rect x="14" y="-26" width="12" height="16" rx="1" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="14" y1="-20" x2="26" y2="-20" stroke="#a78bfa" stroke-width="1"/>
    <line x1="14" y1="-15" x2="26" y2="-15" stroke="#a78bfa" stroke-width="1"/>
    <line x1="20" y1="-26" x2="20" y2="-10" stroke="#a78bfa" stroke-width="1"/>
    <!-- Text -->
    <text x="38" y="-26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#e5e5e5">Google Sheets</text>
    <text x="38" y="-12" font-family="Inter, sans-serif" font-size="10" fill="#888">Export</text>
    <text x="10" y="20" font-family="Inter, sans-serif" font-size="9" fill="#666">Social Data 2026</text>
  </g>

  <!-- Node 6: Airtable (blue) -->
  <g transform="translate(1030, 410)" filter="url(#nodeShadow)">
    <rect x="0" y="-40" width="140" height="80" rx="8" fill="#2a2a2a" stroke="#60a5fa" stroke-width="2"/>
    <rect x="8" y="-32" width="24" height="24" rx="4" fill="#60a5fa" opacity="0.2"/>
    <!-- Airtable grid icon -->
    <rect x="14" y="-26" width="12" height="16" rx="1" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="14" y1="-21" x2="26" y2="-21" stroke="#60a5fa" stroke-width="1"/>
    <line x1="14" y1="-16" x2="26" y2="-16" stroke="#60a5fa" stroke-width="1"/>
    <line x1="19" y1="-26" x2="19" y2="-10" stroke="#60a5fa" stroke-width="1"/>
    <line x1="23" y1="-26" x2="23" y2="-10" stroke="#60a5fa" stroke-width="1"/>
    <!-- Text -->
    <text x="38" y="-26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#e5e5e5">Airtable</text>
    <text x="38" y="-12" font-family="Inter, sans-serif" font-size="10" fill="#888">CRM Sync</text>
    <text x="10" y="20" font-family="Inter, sans-serif" font-size="9" fill="#666">Lead Pipeline</text>
  </g>

  <!-- Workflow title -->
  <text x="40" y="50" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#e5e5e5">Multi-Platform Social Media Scraper Workflow</text>
  <text x="40" y="75" font-family="Inter, sans-serif" font-size="13" fill="#888">Automated data collection from LinkedIn, Twitter, Instagram, Facebook, and TikTok</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- Cyan Glow Filter -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong Glow for Headline -->
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M 54 0 L 0 0 0 54" fill="none" stroke="rgba(0, 255, 255, 0.06)" stroke-width="1"/>
    </pattern>

    <!-- Gradient for grid fade -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#0A0A14;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0A0A14;stop-opacity:0.8" />
    </linearGradient>

    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.6" />
    </radialGradient>

    <!-- Google Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@300;400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0A0A14"/>

  <!-- Grid Pattern Layer -->
  <rect width="1080" height="1080" fill="url(#gridPattern)" opacity="0.6"/>

  <!-- Grid fade overlay -->
  <rect width="1080" height="1080" fill="url(#gridFade)"/>

  <!-- Vignette -->
  <rect width="1080" height="1080" fill="url(#vignette)"/>

  <!-- Decorative corner accents -->
  <path d="M 60 0 L 0 0 L 0 60" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 1020 0 L 1080 0 L 1080 60" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 0 1020 L 0 1080 L 60 1080" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 1080 1020 L 1080 1080 L 1020 1080" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Slide number -->
  <g transform="translate(60, 60)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#00FFFF" stroke-width="2" filter="url(#cyanGlow)"/>
    <text x="30" y="40" font-family="'Playfair Display', serif" font-size="32" font-weight="700" fill="#00FFFF" text-anchor="middle">3</text>
  </g>

  <!-- Locked document visual -->
  <g transform="translate(365, 140)">
    <!-- Folder shape -->
    <path d="M 0 40 L 0 240 L 350 240 L 350 40 L 150 40 L 130 0 L 0 0 Z" fill="none" stroke="#808080" stroke-width="2" opacity="0.4"/>

    <!-- Document inside -->
    <rect x="100" y="70" width="150" height="180" fill="#0A0A14" stroke="#666666" stroke-width="2"/>
    <line x1="120" y1="110" x2="230" y2="110" stroke="#666666" stroke-width="6" opacity="0.5"/>
    <line x1="120" y1="140" x2="210" y2="140" stroke="#666666" stroke-width="6" opacity="0.4"/>
    <line x1="120" y1="170" x2="220" y2="170" stroke="#666666" stroke-width="6" opacity="0.3"/>
    <line x1="120" y1="200" x2="200" y2="200" stroke="#666666" stroke-width="6" opacity="0.2"/>

    <!-- Lock icon -->
    <g transform="translate(140, 100)">
      <rect x="0" y="30" width="70" height="50" fill="#FF00FF" opacity="0.3" stroke="#FF00FF" stroke-width="2"/>
      <path d="M 15 30 L 15 15 Q 15 0 35 0 Q 55 0 55 15 L 55 30" fill="none" stroke="#FF00FF" stroke-width="3"/>
      <circle cx="35" cy="55" r="8" fill="#FF00FF"/>
    </g>
  </g>

  <!-- Main Headline -->
  <text x="540" y="460" font-family="'Playfair Display', serif" font-size="60" font-weight="700" fill="#F5F5F5" text-anchor="middle">
    It can't read your files.
  </text>

  <!-- Horizontal accent line -->
  <line x1="240" y1="500" x2="840" y2="500" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>

  <!-- Body copy -->
  <text x="540" y="580" font-family="'Inter', sans-serif" font-size="26" font-weight="400" fill="#B0B0B0" text-anchor="middle">
    Your best briefs.
  </text>
  <text x="540" y="625" font-family="'Inter', sans-serif" font-size="26" font-weight="400" fill="#B0B0B0" text-anchor="middle">
    Your winning arguments.
  </text>
  <text x="540" y="670" font-family="'Inter', sans-serif" font-size="26" font-weight="400" fill="#B0B0B0" text-anchor="middle">
    Your institutional knowledge.
  </text>

  <!-- Callout box -->
  <g transform="translate(190, 740)">
    <rect x="0" y="0" width="700" height="80" fill="none" stroke="#FF00FF" stroke-width="1" opacity="0.5"/>
    <rect x="0" y="0" width="4" height="80" fill="#FF00FF" opacity="0.8"/>
    <text x="30" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="600" fill="#F5F5F5">
      Generic AI has no access to any of it.
    </text>
  </g>

  <!-- Document icons representing firm files -->
  <g transform="translate(180, 870)">
    <rect x="0" y="0" width="60" height="80" fill="none" stroke="#666666" stroke-width="1" opacity="0.4"/>
    <text x="30" y="50" font-family="'Inter', sans-serif" font-size="10" fill="#666666" text-anchor="middle">Brief</text>
  </g>
  <g transform="translate(280, 870)">
    <rect x="0" y="0" width="60" height="80" fill="none" stroke="#666666" stroke-width="1" opacity="0.4"/>
    <text x="30" y="50" font-family="'Inter', sans-serif" font-size="10" fill="#666666" text-anchor="middle">Memo</text>
  </g>
  <g transform="translate(380, 870)">
    <rect x="0" y="0" width="60" height="80" fill="none" stroke="#666666" stroke-width="1" opacity="0.4"/>
    <text x="30" y="50" font-family="'Inter', sans-serif" font-size="10" fill="#666666" text-anchor="middle">Motion</text>
  </g>
  <g transform="translate(480, 870)">
    <rect x="0" y="0" width="60" height="80" fill="none" stroke="#666666" stroke-width="1" opacity="0.4"/>
    <text x="30" y="50" font-family="'Inter', sans-serif" font-size="10" fill="#666666" text-anchor="middle">Contract</text>
  </g>
  <g transform="translate(580, 870)">
    <rect x="0" y="0" width="60" height="80" fill="none" stroke="#666666" stroke-width="1" opacity="0.4"/>
    <text x="30" y="50" font-family="'Inter', sans-serif" font-size="10" fill="#666666" text-anchor="middle">Research</text>
  </g>
  <g transform="translate(680, 870)">
    <rect x="0" y="0" width="60" height="80" fill="none" stroke="#666666" stroke-width="1" opacity="0.4"/>
    <text x="30" y="50" font-family="'Inter', sans-serif" font-size="10" fill="#666666" text-anchor="middle">Opinion</text>
  </g>
  <g transform="translate(780, 870)">
    <rect x="0" y="0" width="60" height="80" fill="none" stroke="#666666" stroke-width="1" opacity="0.4"/>
    <text x="30" y="50" font-family="'Inter', sans-serif" font-size="10" fill="#666666" text-anchor="middle">Filing</text>
  </g>

  <!-- Swipe indicator -->
  <g transform="translate(470, 960)">
    <path d="M 70 0 L 85 12 L 70 24" stroke="#666666" stroke-width="2" fill="none"/>
    <path d="M 85 0 L 100 12 L 85 24" stroke="#666666" stroke-width="2" fill="none"/>
  </g>

  <!-- Cerebro branding -->
  <text x="540" y="1040" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#00FFFF" text-anchor="middle" filter="url(#cyanGlow)">
    CEREBRO
  </text>

</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- Cyan Glow Filter -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong Glow for Headlines -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(0, 255, 255, 0.05)" stroke-width="1"/>
    </pattern>

    <!-- Gradient for grid fade -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0A0A14;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0A0A14;stop-opacity:0" />
    </linearGradient>

    <!-- Bottom gradient fade -->
    <linearGradient id="bottomFade" x1="0%" y1="100%" x2="0%" y2="70%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A14;stop-opacity:0" />
    </linearGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.5" />
    </radialGradient>

    <!-- Google Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@300;400;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0A0A14"/>

  <!-- Grid Pattern Layer -->
  <rect width="1080" height="1080" fill="url(#gridPattern)" opacity="0.6"/>

  <!-- Grid fade overlay -->
  <rect width="1080" height="1080" fill="url(#gridFade)"/>

  <!-- Bottom fade for depth -->
  <rect width="1080" height="300" y="780" fill="url(#bottomFade)"/>

  <!-- Vignette -->
  <rect width="1080" height="1080" fill="url(#vignette)"/>

  <!-- Decorative corner accents -->
  <path d="M 1000 0 L 1080 0 L 1080 80" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 0 1000 L 0 1080 L 80 1080" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Dollar Sign Icon -->
  <g transform="translate(540, 140)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#00FFFF" stroke-width="2" filter="url(#cyanGlow)"/>
    <text x="0" y="20" font-family="'Playfair Display', serif" font-size="60" font-weight="700" fill="#00FFFF" filter="url(#strongGlow)" text-anchor="middle">
      $
    </text>
  </g>

  <!-- Main Headline: Big Number -->
  <text x="540" y="300" font-family="'Playfair Display', serif" font-size="96" font-weight="700" fill="#00FFFF" filter="url(#strongGlow)" text-anchor="middle">
    $40,000
  </text>
  <text x="540" y="360" font-family="'Playfair Display', serif" font-size="36" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    per attorney, per year
  </text>

  <!-- Divider line -->
  <line x1="340" y1="410" x2="740" y2="410" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>

  <!-- Math Breakdown -->
  <text x="540" y="470" font-family="'Inter', sans-serif" font-size="20" font-weight="400" fill="#B0B0B0" text-anchor="middle">
    The math when AI actually works:
  </text>

  <!-- Math Points -->
  <g transform="translate(280, 520)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="24" font-weight="400" fill="#F5F5F5">
      <tspan fill="#00FFFF">&#x2022;</tspan>
      <tspan dx="15">2 hours saved per week</tspan>
    </text>
    <text x="0" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="400" fill="#F5F5F5">
      <tspan fill="#00FFFF">&#x2022;</tspan>
      <tspan dx="15">$400 billable rate</tspan>
    </text>
    <text x="0" y="100" font-family="'Inter', sans-serif" font-size="24" font-weight="400" fill="#F5F5F5">
      <tspan fill="#00FFFF">&#x2022;</tspan>
      <tspan dx="15">50 weeks</tspan>
    </text>
  </g>

  <!-- Warning -->
  <g transform="translate(540, 720)">
    <rect x="-280" y="-25" width="560" height="50" rx="4" fill="#1A1A2E" stroke="#FFB800" stroke-width="1"/>
    <text x="0" y="8" font-family="'Inter', sans-serif" font-size="18" font-weight="500" fill="#FFB800" text-anchor="middle">
      But only if the research is right.
    </text>
  </g>

  <!-- Value Prop -->
  <text x="540" y="810" font-family="'Inter', sans-serif" font-size="20" font-weight="400" fill="#B0B0B0" text-anchor="middle">
    Cerebro verifies every citation.
  </text>

  <!-- CTA Box -->
  <g transform="translate(540, 890)">
    <rect x="-200" y="-35" width="400" height="70" rx="8" fill="#00FFFF" filter="url(#cyanGlow)"/>
    <text x="0" y="8" font-family="'Inter', sans-serif" font-size="20" font-weight="600" fill="#0A0A14" text-anchor="middle">
      10 Pilot Slots for February
    </text>
  </g>

  <!-- Footer -->
  <text x="540" y="1000" font-family="'Inter', sans-serif" font-size="14" font-weight="400" fill="#666666" text-anchor="middle">
    theinnovativenative.com/law-firm-rag
  </text>

  <!-- TIN Logo -->
  <text x="980" y="1050" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#00FFFF" filter="url(#cyanGlow)">
    TIN
  </text>

</svg>

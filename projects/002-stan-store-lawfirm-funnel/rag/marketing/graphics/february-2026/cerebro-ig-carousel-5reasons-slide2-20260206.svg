<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- Cyan Glow Filter -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong Glow for Headline -->
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M 54 0 L 0 0 0 54" fill="none" stroke="rgba(0, 255, 255, 0.06)" stroke-width="1"/>
    </pattern>

    <!-- Gradient for grid fade -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#0A0A14;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0A0A14;stop-opacity:0.8" />
    </linearGradient>

    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.6" />
    </radialGradient>

    <!-- Google Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@300;400;600&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0A0A14"/>

  <!-- Grid Pattern Layer -->
  <rect width="1080" height="1080" fill="url(#gridPattern)" opacity="0.6"/>

  <!-- Grid fade overlay -->
  <rect width="1080" height="1080" fill="url(#gridFade)"/>

  <!-- Vignette -->
  <rect width="1080" height="1080" fill="url(#vignette)"/>

  <!-- Decorative corner accents -->
  <path d="M 60 0 L 0 0 L 0 60" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 1020 0 L 1080 0 L 1080 60" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 0 1020 L 0 1080 L 60 1080" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 1080 1020 L 1080 1080 L 1020 1080" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Slide number -->
  <g transform="translate(60, 60)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#00FFFF" stroke-width="2" filter="url(#cyanGlow)"/>
    <text x="30" y="40" font-family="'Playfair Display', serif" font-size="32" font-weight="700" fill="#00FFFF" text-anchor="middle">1</text>
  </g>

  <!-- Hallucination visual - Ghost document -->
  <g transform="translate(340, 180)">
    <!-- Document shape with glitch effect -->
    <rect x="0" y="0" width="200" height="260" fill="none" stroke="#FF00FF" stroke-width="2" opacity="0.4" stroke-dasharray="10,5"/>
    <rect x="10" y="10" width="200" height="260" fill="none" stroke="#00FFFF" stroke-width="2" opacity="0.3" stroke-dasharray="10,5"/>
    <rect x="20" y="20" width="200" height="260" fill="none" stroke="#F5F5F5" stroke-width="2" opacity="0.2"/>

    <!-- Fake text lines that fade/glitch -->
    <line x1="50" y1="80" x2="190" y2="80" stroke="#F5F5F5" stroke-width="8" opacity="0.3"/>
    <line x1="50" y1="110" x2="170" y2="110" stroke="#F5F5F5" stroke-width="8" opacity="0.2"/>
    <line x1="50" y1="140" x2="180" y2="140" stroke="#F5F5F5" stroke-width="8" opacity="0.15"/>
    <line x1="50" y1="170" x2="160" y2="170" stroke="#F5F5F5" stroke-width="8" opacity="0.1"/>

    <!-- Question mark overlay -->
    <text x="130" y="220" font-family="'Playfair Display', serif" font-size="80" font-weight="700" fill="#FF00FF" text-anchor="middle" opacity="0.7">?</text>
  </g>

  <!-- Main Headline -->
  <text x="540" y="520" font-family="'Playfair Display', serif" font-size="64" font-weight="700" fill="#F5F5F5" text-anchor="middle">
    It makes up cases.
  </text>

  <!-- Horizontal accent line -->
  <line x1="240" y1="560" x2="840" y2="560" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>

  <!-- Body copy -->
  <text x="540" y="640" font-family="'Inter', sans-serif" font-size="28" font-weight="400" fill="#B0B0B0" text-anchor="middle">
    GPT-style AI invents citations
  </text>
  <text x="540" y="685" font-family="'Inter', sans-serif" font-size="28" font-weight="400" fill="#B0B0B0" text-anchor="middle">
    when it's uncertain.
  </text>

  <text x="540" y="760" font-family="'Inter', sans-serif" font-size="24" font-weight="400" fill="#808080" text-anchor="middle">
    It doesn't know what it doesn't know.
  </text>

  <!-- Callout box -->
  <g transform="translate(190, 820)">
    <rect x="0" y="0" width="700" height="80" fill="none" stroke="#FF00FF" stroke-width="1" opacity="0.5"/>
    <rect x="0" y="0" width="4" height="80" fill="#FF00FF" opacity="0.8"/>
    <text x="30" y="50" font-family="'Inter', sans-serif" font-size="22" font-weight="400" fill="#F5F5F5">
      One attorney found 3 fake cases in a single response.
    </text>
  </g>

  <!-- Swipe indicator -->
  <g transform="translate(470, 960)">
    <path d="M 70 0 L 85 12 L 70 24" stroke="#666666" stroke-width="2" fill="none"/>
    <path d="M 85 0 L 100 12 L 85 24" stroke="#666666" stroke-width="2" fill="none"/>
  </g>

  <!-- Cerebro branding -->
  <text x="540" y="1040" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#00FFFF" text-anchor="middle" filter="url(#cyanGlow)">
    CEREBRO
  </text>

</svg>
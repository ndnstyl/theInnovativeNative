<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- Cyan Glow Filter -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong Glow for Headline -->
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M 54 0 L 0 0 0 54" fill="none" stroke="rgba(0, 255, 255, 0.06)" stroke-width="1"/>
    </pattern>

    <!-- Gradient for grid fade -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#0A0A14;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0A0A14;stop-opacity:0.8" />
    </linearGradient>

    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.6" />
    </radialGradient>

    <!-- Google Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@300;400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0A0A14"/>

  <!-- Grid Pattern Layer -->
  <rect width="1080" height="1080" fill="url(#gridPattern)" opacity="0.6"/>

  <!-- Grid fade overlay -->
  <rect width="1080" height="1080" fill="url(#gridFade)"/>

  <!-- Vignette -->
  <rect width="1080" height="1080" fill="url(#vignette)"/>

  <!-- Decorative corner accents -->
  <path d="M 60 0 L 0 0 L 0 60" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 1020 0 L 1080 0 L 1080 60" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 0 1020 L 0 1080 L 60 1080" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 1080 1020 L 1080 1080 L 1020 1080" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Slide number -->
  <g transform="translate(60, 60)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#00FFFF" stroke-width="2" filter="url(#cyanGlow)"/>
    <text x="30" y="40" font-family="'Playfair Display', serif" font-size="32" font-weight="700" fill="#00FFFF" text-anchor="middle">4</text>
  </g>

  <!-- No audit trail visual - broken chain/connection -->
  <g transform="translate(290, 150)">
    <!-- Source document -->
    <rect x="0" y="50" width="120" height="150" fill="none" stroke="#666666" stroke-width="2" opacity="0.5"/>
    <text x="60" y="130" font-family="'Inter', sans-serif" font-size="14" fill="#666666" text-anchor="middle">Source?</text>

    <!-- Broken line with question marks -->
    <line x1="140" y1="125" x2="200" y2="125" stroke="#FF00FF" stroke-width="2" stroke-dasharray="8,8" opacity="0.5"/>
    <text x="220" y="135" font-family="'Inter', sans-serif" font-size="32" fill="#FF00FF" opacity="0.7">?</text>
    <line x1="250" y1="125" x2="310" y2="125" stroke="#FF00FF" stroke-width="2" stroke-dasharray="8,8" opacity="0.5"/>
    <text x="330" y="135" font-family="'Inter', sans-serif" font-size="32" fill="#FF00FF" opacity="0.7">?</text>
    <line x1="360" y1="125" x2="420" y2="125" stroke="#FF00FF" stroke-width="2" stroke-dasharray="8,8" opacity="0.5"/>

    <!-- AI output -->
    <rect x="440" y="50" width="120" height="150" fill="none" stroke="#808080" stroke-width="2" opacity="0.5"/>
    <text x="500" y="100" font-family="'Inter', sans-serif" font-size="14" fill="#808080" text-anchor="middle">AI Output</text>
    <line x1="460" y1="130" x2="540" y2="130" stroke="#808080" stroke-width="4" opacity="0.4"/>
    <line x1="460" y1="150" x2="520" y2="150" stroke="#808080" stroke-width="4" opacity="0.3"/>
    <line x1="460" y1="170" x2="530" y2="170" stroke="#808080" stroke-width="4" opacity="0.2"/>
  </g>

  <!-- Main Headline -->
  <text x="540" y="430" font-family="'Playfair Display', serif" font-size="56" font-weight="700" fill="#F5F5F5" text-anchor="middle">
    You can't verify anything.
  </text>

  <!-- Horizontal accent line -->
  <line x1="240" y1="470" x2="840" y2="470" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>

  <!-- Body copy -->
  <text x="540" y="550" font-family="'Inter', sans-serif" font-size="28" font-weight="400" fill="#B0B0B0" text-anchor="middle">
    Where did that answer come from?
  </text>

  <!-- Three "No" items -->
  <g transform="translate(300, 610)">
    <circle cx="20" cy="15" r="15" fill="none" stroke="#FF00FF" stroke-width="2" opacity="0.6"/>
    <line x1="10" y1="5" x2="30" y2="25" stroke="#FF00FF" stroke-width="2"/>
    <text x="50" y="22" font-family="'Inter', sans-serif" font-size="24" font-weight="400" fill="#808080">No citation.</text>
  </g>
  <g transform="translate(300, 680)">
    <circle cx="20" cy="15" r="15" fill="none" stroke="#FF00FF" stroke-width="2" opacity="0.6"/>
    <line x1="10" y1="5" x2="30" y2="25" stroke="#FF00FF" stroke-width="2"/>
    <text x="50" y="22" font-family="'Inter', sans-serif" font-size="24" font-weight="400" fill="#808080">No source.</text>
  </g>
  <g transform="translate(300, 750)">
    <circle cx="20" cy="15" r="15" fill="none" stroke="#FF00FF" stroke-width="2" opacity="0.6"/>
    <line x1="10" y1="5" x2="30" y2="25" stroke="#FF00FF" stroke-width="2"/>
    <text x="50" y="22" font-family="'Inter', sans-serif" font-size="24" font-weight="400" fill="#808080">No way to check.</text>
  </g>

  <!-- Challenge question -->
  <g transform="translate(190, 850)">
    <rect x="0" y="0" width="700" height="70" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
    <text x="350" y="45" font-family="'Inter', sans-serif" font-size="22" font-weight="600" fill="#F5F5F5" text-anchor="middle">
      Would you trust that in front of a judge?
    </text>
  </g>

  <!-- Swipe indicator -->
  <g transform="translate(470, 960)">
    <path d="M 70 0 L 85 12 L 70 24" stroke="#666666" stroke-width="2" fill="none"/>
    <path d="M 85 0 L 100 12 L 85 24" stroke="#666666" stroke-width="2" fill="none"/>
  </g>

  <!-- Cerebro branding -->
  <text x="540" y="1040" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#00FFFF" text-anchor="middle" filter="url(#cyanGlow)">
    CEREBRO
  </text>

</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <!-- Cyan Glow Filter -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong Glow for Headline -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(0, 255, 255, 0.06)" stroke-width="1"/>
    </pattern>

    <!-- Gradient for grid fade -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0A0A14;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0A0A14;stop-opacity:0" />
    </linearGradient>

    <!-- Bottom gradient fade -->
    <linearGradient id="bottomFade" x1="0%" y1="100%" x2="0%" y2="70%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A14;stop-opacity:0" />
    </linearGradient>

    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.5" />
    </radialGradient>

    <!-- Google Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@300;400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="#0A0A14"/>

  <!-- Grid Pattern Layer -->
  <rect width="1200" height="628" fill="url(#gridPattern)" opacity="0.5"/>

  <!-- Grid fade overlay -->
  <rect width="1200" height="628" fill="url(#gridFade)"/>

  <!-- Bottom fade for depth -->
  <rect width="1200" height="200" y="428" fill="url(#bottomFade)"/>

  <!-- Vignette -->
  <rect width="1200" height="628" fill="url(#vignette)"/>

  <!-- Subtle horizontal line accent -->
  <line x1="80" y1="520" x2="400" y2="520" stroke="#00FFFF" stroke-width="1" opacity="0.3"/>

  <!-- Main Content -->

  <!-- Headline: 8,800 hours recovered -->
  <text x="80" y="180" font-family="'Playfair Display', serif" font-size="72" font-weight="700" fill="#00FFFF" filter="url(#strongGlow)">
    8,800 hours recovered
  </text>

  <!-- Metric: in a single year -->
  <text x="80" y="240" font-family="'Playfair Display', serif" font-size="36" font-weight="400" fill="#FFFFFF">
    in a single year
  </text>

  <!-- Subtext: AmLaw 100 firm, 2024 -->
  <text x="80" y="310" font-family="'Inter', sans-serif" font-size="24" font-weight="400" fill="#B0B0B0">
    AmLaw 100 firm, 2024
  </text>

  <!-- Source -->
  <text x="80" y="360" font-family="'Inter', sans-serif" font-size="16" font-weight="300" fill="#808080">
    Source: Microsoft Copilot case study
  </text>

  <!-- CTA -->
  <text x="80" y="440" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#00FFFF" filter="url(#cyanGlow)">
    Your firm could be next
  </text>

  <!-- Arrow for CTA -->
  <path d="M 330 434 L 345 440 L 330 446" stroke="#00FFFF" stroke-width="2" fill="none" filter="url(#cyanGlow)"/>

  <!-- Footer URL -->
  <text x="80" y="580" font-family="'Inter', sans-serif" font-size="14" font-weight="400" fill="#666666">
    theinnovativenative.com/law-firm-rag
  </text>

  <!-- TIN Logo placeholder (simplified mark) -->
  <g transform="translate(1020, 540)">
    <rect x="0" y="0" width="100" height="40" fill="none"/>
    <text x="0" y="28" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#00FFFF" filter="url(#cyanGlow)">
      TIN
    </text>
  </g>

  <!-- Decorative corner accent -->
  <path d="M 1120 0 L 1200 0 L 1200 80" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 0 548 L 0 628 L 80 628" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.3"/>

</svg>

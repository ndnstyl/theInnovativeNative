## File Naming Conventions (Normalized)

### Opinions
{court_code}__{year}-{month}-{day}__{docket_or_cite_hash}__{slug}.json

Examples:
scotus__2020-06-18__20-0012__bostock.json
ca5__2023-11-07__22-30521__in_re_westwood.json
txsb__2024-03-02__23-31118__in_re_smith.json
bia__2018-05-14__a123456789__matter_of_x.json

Each JSON includes:
- document_id (UUID)
- source_url (if available)
- sha256 of raw source
- court, date, docket/cite
- practice_area
- precedential_weight
- text_body

### Statutes / Rules
usc_title_11__2026-02-03.json
frbp__2026-02-03.json
fed_rcp__2026-02-03.json
fed_rcmp__2026-02-03.json
fed_re__2026-02-03.json
apa__2026-02-03.json


## Versioning
- `chunks/v1` means the first deterministic chunking spec.
- `embeddings/v1` binds to:
  - embedding model name + version
  - dimensionality
  - normalization settings
- `indexes/v1` binds to:
  - vector index type (pgvector/qdrant/lancedb)
  - distance metric
  - filter schema version

No in-place mutation. New build → new version folder.